# Dev-oriented compose file implementing the topology decided in
# docs/06-architecture.md §6: web (scalable), worker, beat (singleton —
# never scale this one, per that section's note), redis, postgres.
# MinIO stands in locally for the S3-compatible object storage decided
# in docs/06-architecture.md §2 ("MinIO as the S3-compatible local/dev
# equivalent"); production points django-storages at real AWS S3 instead
# via the .env values, same codebase, no compose file change needed.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console — create the bucket here on first run

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/dev.txt
    command: python manage.py runserver 0.0.0.0:8000
    env_file: ../.env
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/dev.txt
    command: celery -A config worker -l info
    env_file: ../.env
    volumes:
      - ..:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        REQUIREMENTS_FILE: requirements/dev.txt
    command: celery -A config beat -l info
    env_file: ../.env
    volumes:
      - ..:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # Deliberately never scale this service — docs/06-architecture.md §6:
    # running more than one Beat process double-fires scheduled jobs.
    deploy:
      replicas: 1

volumes:
  postgres_data:
  minio_data:
