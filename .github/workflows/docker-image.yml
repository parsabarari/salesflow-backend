name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: docker build -f docker/Dockerfile -t crm-backend .

      - name: Start containers
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait
        run: sleep 15

      - name: Migrate
        run: docker compose -f docker/docker-compose.yml exec -T backend python manage.py migrate

      - name: Run Tests
        run: docker compose -f docker/docker-compose.yml exec -T backend pytest

      - name: Ruff
        run: docker compose -f docker/docker-compose.yml exec -T backend ruff check .

      - name: Black
        run: docker compose -f docker/docker-compose.yml exec -T backend black --check .

      - name: Stop
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
